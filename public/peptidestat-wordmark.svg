<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 650" width="1900" height="650" role="img" aria-labelledby="title desc">
  <title id="title">PeptideStat logo with wordmark</title>
  <desc id="desc">Clean navy laboratory logo with beaker icon and PEPTIDESTAT wordmark, with padding so the full mark is visible.</desc>
  <defs>
    <style>
      .ink{fill:#031a34}
      .stroke{stroke:#031a34;stroke-width:12;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .word{font-family:Arial, Helvetica, sans-serif;font-weight:800;letter-spacing:24px;fill:#031a34}
    </style>
  </defs>
  <rect x="0" y="0" width="1900" height="650" fill="#ffffff"/>

  <!-- Icon group -->
  <g transform="translate(95 95) scale(.78)">
    <!-- open lab/periodic frame -->
    <path class="stroke" d="M36 36H250"/>
    <path class="stroke" d="M500 36H610"/>
    <path class="stroke" d="M36 36V438"/>
    <path class="stroke" d="M36 438H610"/>
    <path class="stroke" d="M610 36V438"/>

    <!-- flask outline -->
    <path class="stroke" d="M286 92H392"/>
    <path class="stroke" d="M305 92V197L209 406"/>
    <path class="stroke" d="M374 92V197L470 406"/>
    <path class="stroke" d="M209 406C196 435 217 468 250 468H431C464 468 484 435 470 406"/>
    <path class="stroke" d="M286 132H305"/>
    <path class="stroke" d="M286 177H305"/>

    <!-- liquid -->
    <path class="ink" d="M250 421C245 436 255 449 271 449H410C426 449 435 436 429 421L398 352C363 328 324 329 288 354L250 421Z"/>
    <path d="M250 421C245 436 255 449 271 449H410C426 449 435 436 429 421" stroke="#031a34" stroke-width="10" stroke-linecap="round" fill="none"/>

    <!-- molecule -->
    <path d="M277 398L319 428L363 390L409 423" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M363 390L382 338" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="277" cy="398" r="18" fill="#031a34" stroke="#fff" stroke-width="9"/>
    <circle cx="319" cy="428" r="18" fill="#031a34" stroke="#fff" stroke-width="9"/>
    <circle cx="363" cy="390" r="18" fill="#fff"/>
    <circle cx="409" cy="423" r="20" fill="#031a34" stroke="#fff" stroke-width="9"/>
    <circle cx="382" cy="338" r="18" fill="#031a34" stroke="#fff" stroke-width="9"/>

    <!-- bubbles -->
    <circle class="ink" cx="343" cy="-25" r="15"/>
    <circle class="ink" cx="320" cy="45" r="20"/>
    <circle class="ink" cx="278" cy="80" r="16"/>
  </g>

  <!-- Wordmark -->
  <text class="word" x="620" y="365" font-size="112">PEPTIDESTAT</text>
</svg>

name: Ascension catalog audit

on:
  schedule:
    - cron: "17 11 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Compare direct referral catalog
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit Ascension category pages and referral paths
        run: npm run audit:ascension
